name: Incremental Vault Review

on:
  workflow_call:
    inputs:
      batch_mode:
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  incremental-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout obsidian-agent repo
        uses: actions/checkout@v6
        with:
          repository: travisboettcher/obsidian-agent
          path: obsidian-agent

      - name: Checkout vault repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: vault
          fetch-depth: 0  # full history required for git diff

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r obsidian-agent/requirements.txt

      - name: Compute branch name
        id: vars
        run: echo "BRANCH=vault-agent/incremental-$(date +%Y-%m-%dT%H-%M-%S)" >> "$GITHUB_OUTPUT"

      - name: Configure git + create branch
        run: |
          git -C vault config user.email "vault-agent@github-actions"
          git -C vault config user.name "Vault Agent"
          git -C vault checkout -b "${{ steps.vars.outputs.BRANCH }}"

      - name: Run incremental agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAULT_DIR: ./vault
          BATCH_MODE: ${{ inputs.batch_mode && '1' || '0' }}
          DRY_RUN: "0"
        run: python3 obsidian-agent/incremental_agent.py > /tmp/pr_body.txt

      - name: Commit vault changes
        run: |
          git -C vault add -A
          if ! git -C vault diff --cached --quiet; then
            git -C vault commit -m "chore: incremental vault review $(date +%Y-%m-%d)"
          fi

      - name: Push branch to vault
        run: git -C vault push -u origin "${{ steps.vars.outputs.BRANCH }}"

      - name: Open PR via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --title "Vault: incremental review $(date +%Y-%m-%d)" \
            --head "${{ steps.vars.outputs.BRANCH }}" \
            --base main \
            --body-file /tmp/pr_body.txt
