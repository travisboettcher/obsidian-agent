name: Daily Review

on:
  workflow_call:
    inputs:
      timezone:
        type: string
        default: "UTC"
        description: "IANA timezone name used to determine today's date (e.g. America/Chicago)"
      date:
        type: string
        default: ""
        description: "Override date as YYYY-MM-DD. If empty, uses today in the given timezone."
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  daily-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout obsidian-agent repo
        uses: actions/checkout@v6
        with:
          repository: travisboettcher/obsidian-agent
          path: obsidian-agent

      - name: Checkout vault repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: vault
          fetch-depth: 10

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r obsidian-agent/requirements.txt

      - name: Compute date and branch name
        id: vars
        run: |
          python3 - <<'PYEOF'
          import os
          from datetime import date, datetime
          from zoneinfo import ZoneInfo

          date_override = "${{ inputs.date }}"
          tz_name = "${{ inputs.timezone }}" or "UTC"

          if date_override:
              today = date.fromisoformat(date_override)
          else:
              today = datetime.now(ZoneInfo(tz_name)).date()

          branch = f"vault-agent/daily-{today.isoformat()}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"DATE={today.isoformat()}\n")
              f.write(f"BRANCH={branch}\n")
          PYEOF

      - name: Create branch in vault
        run: |
          git -C vault config user.email "vault-agent@github-actions"
          git -C vault config user.name "Vault Agent"
          git -C vault checkout -b "${{ steps.vars.outputs.BRANCH }}"

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAULT_DIR: ./vault
          DATE: ${{ steps.vars.outputs.DATE }}
        run: |
          python3 obsidian-agent/daily_agent.py > /tmp/pr_body.txt

      - name: Commit vault changes
        id: commit
        run: |
          git -C vault add -A
          if ! git -C vault diff --cached --quiet; then
            git -C vault commit -m "chore: daily review ${{ steps.vars.outputs.DATE }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit — skipping push and PR"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch to vault
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          git -C vault push origin "${{ steps.vars.outputs.BRANCH }}"

      - name: Open PR via GitHub CLI
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --title "Daily review: ${{ steps.vars.outputs.DATE }}" \
            --head "${{ steps.vars.outputs.BRANCH }}" \
            --base main \
            --body-file /tmp/pr_body.txt
