name: Weekly Review

on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 8am UTC
  workflow_dispatch:      # Allow manual trigger from Gitea UI

jobs:
  weekly-review:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ vars.BASE_URL }}
          VAULT_REPO: ${{ vars.VAULT_REPO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          missing=()
          [ -z "$AUTH_TOKEN" ]       && missing+=(AUTH_TOKEN)
          [ -z "$BASE_URL" ]         && missing+=(BASE_URL)
          [ -z "$VAULT_REPO" ]       && missing+=(VAULT_REPO)
          [ -z "$ANTHROPIC_API_KEY" ] && missing+=(ANTHROPIC_API_KEY)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Checkout obsidian-agent repo
        uses: actions/checkout@v4
        with:
          path: obsidian-agent

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.VAULT_REPO }}
          token: ${{ secrets.AUTH_TOKEN }}
          path: vault

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r obsidian-agent/requirements.txt

      - name: Compute week and branch name
        id: vars
        run: |
          python3 - <<'PYEOF'
          import os
          from datetime import date, timedelta

          today = date.today()
          # We run on Monday; the completed week ended last Sunday
          last_sunday = today - timedelta(days=1)
          iso = last_sunday.isocalendar()
          week = f"{iso[0]}-W{iso[1]:02d}"
          branch = f"vault-agent/{today.isoformat()}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"WEEK={week}\n")
              f.write(f"BRANCH={branch}\n")
          PYEOF

      - name: Create branch in vault
        run: |
          git -C vault config user.email "vault-agent@gitea.local"
          git -C vault config user.name "Vault Agent"
          git -C vault checkout -b "${{ steps.vars.outputs.BRANCH }}"

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAULT_DIR: ./vault
          WEEK: ${{ steps.vars.outputs.WEEK }}
        run: |
          python3 obsidian-agent/agent.py > /tmp/pr_body.txt

      - name: Commit vault changes
        run: |
          git -C vault add -A
          # Commit only if there are staged changes
          if ! git -C vault diff --cached --quiet; then
            git -C vault commit -m "chore: weekly review ${{ steps.vars.outputs.WEEK }}"
          else
            echo "No changes to commit"
          fi

      - name: Push branch to vault
        run: |
          git -C vault push origin "${{ steps.vars.outputs.BRANCH }}"

      - name: Open PR via Gitea API
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ vars.BASE_URL }}
          VAULT_REPO: ${{ vars.VAULT_REPO }}
          WEEK: ${{ steps.vars.outputs.WEEK }}
          BRANCH: ${{ steps.vars.outputs.BRANCH }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          pr_body = open("/tmp/pr_body.txt").read().strip()
          payload = json.dumps({
              "title": f"Weekly review: {os.environ['WEEK']}",
              "head":  os.environ["BRANCH"],
              "base":  "main",
              "body":  pr_body,
          })

          result = subprocess.run(
              [
                  "curl", "--fail-with-body", "-s", "-X", "POST",
                  f"{os.environ['BASE_URL']}/api/v1/repos/{os.environ['VAULT_REPO']}/pulls",
                  "-H", f"Authorization: token {os.environ['AUTH_TOKEN']}",
                  "-H", "Content-Type: application/json",
                  "-d", payload,
              ],
              capture_output=True, text=True,
          )
          print(result.stdout)
          if result.returncode != 0:
              print(result.stderr, flush=True)
              raise SystemExit(result.returncode)
          PYEOF
